{{ define "main" }}

<div class="container">
  <div class="contact-page">

    <header class="contact-header">
      <h1>Get in Touch</h1>
      <p>Have a question about a project, want to collaborate, or just want to say hi? Send a message below.</p>
    </header>

    <div class="contact-body">

      <form class="contact-form" action="https://formspree.io/f/{{ .Site.Params.formspreeId }}" method="POST">
        <div class="form-group">
          <label for="contact-name">Name</label>
          <input type="text" id="contact-name" name="name" placeholder="Your name" required>
        </div>

        <div class="form-group">
          <label for="contact-email">Email</label>
          <input type="email" id="contact-email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label for="contact-subject">Subject</label>
          <input type="text" id="contact-subject" name="subject" placeholder="What's this about?">
        </div>

        <div class="form-group">
          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="message" rows="6" placeholder="Tell me more…" required></textarea>
        </div>

        <input type="hidden" name="_subject" value="New message from blankschematic.com">
        <input type="hidden" name="_replyto" value="{{ "{{email}}" }}">

        <button type="submit" class="contact-submit">Send Message</button>
      </form>

      <aside class="contact-aside">
        <div class="contact-aside-block">
          <div class="contact-aside-label">// direct email</div>
          <a href="mailto:support@blankschematic.com" class="contact-email-link">support@blankschematic.com</a>
        </div>
        <div class="contact-aside-block">
          <div class="contact-aside-label">// on github</div>
          <a href="https://github.com/mpflaga" target="_blank" rel="noopener">github.com/mpflaga ↗</a>
        </div>
        <div class="contact-aside-block">
          <div class="contact-aside-label">// response time</div>
          <span>Usually within a few days</span>
        </div>
      </aside>

    </div>
  </div>
</div>

{{ end }}
